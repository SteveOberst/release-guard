name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'release-guard/Editor/**'
      - 'release-guard/Runtime/**'
      - 'release-guard/Tests/**'
      - 'UnityDevHost/Packages/**'
      - 'UnityDevHost/Assets/**'
  pull_request:
    paths:
      - 'release-guard/Editor/**'
      - 'release-guard/Runtime/**'
      - 'release-guard/Tests/**'
      - 'UnityDevHost/Packages/**'
      - 'UnityDevHost/Assets/**'
  workflow_dispatch:

# Runs the EditMode test suite against the UnityDevHost project, which embeds this
# package via "file:../.." and lists it under "testables".
#
# customImage: GameCI publishes images on a slight lag behind Unity releases. Pin to
# the latest available 6000.4.x base image; update when GameCI publishes a newer patch.
# Check https://hub.docker.com/r/unityci/editor/tags?name=ubuntu-6000.4 for new tags.
# The "base" variant is sufficient for EditMode tests (no IL2CPP toolchain needed).
#
# REQUIRED SETUP (one-time): this job needs a Unity license to activate the editor
# in CI. Add repository secrets before it can go green:
#   - UNITY_LICENSE  : contents of your .ulf license file (Personal license), OR
#   - UNITY_SERIAL + UNITY_EMAIL + UNITY_PASSWORD (Plus/Pro license)
# See https://game.ci/docs/github/activation for how to obtain the .ulf file.
# Until a license secret is configured, this job will fail at the activation step;
# it does not block merges unless you enable it as a required status check.
jobs:
  editmode:
    name: EditMode tests
    runs-on: ubuntu-latest
    # Secrets are not available for fork PRs (GitHub withholds them by design),
    # so skip rather than fail with a confusing "missing license" error.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: UnityDevHost/Library
          key: Library-UnityDevHost-${{ hashFiles('release-guard/Editor/**', 'release-guard/Runtime/**', 'release-guard/Tests/**', 'UnityDevHost/Packages/**') }}
          restore-keys: |
            Library-UnityDevHost-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: UnityDevHost
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customImage: unityci/editor:ubuntu-6000.4.8f1-base-3

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: artifacts
