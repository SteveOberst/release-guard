name: Sync README to package

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - assets/**

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate package README
        run: |
          {
            echo "<!-- ============================================================"
            echo "     AUTO-GENERATED FILE - do not edit this file directly."
            echo "     Edit the root README.md instead. This file is regenerated"
            echo "     automatically on every push to main that touches README.md."
            echo "     Changes made here will be overwritten."
            echo "     ============================================================ -->"
            echo ""
            # Rewrite root-relative asset/doc paths to package-relative ones
            sed \
              -e 's|release-guard/Documentation~/|Documentation~/|g' \
              -e 's|(assets/|(Documentation~/assets/|g' \
              README.md
          } > release-guard/README.md

      - name: Sync documentation assets into package
        run: |
          mkdir -p release-guard/Documentation~/assets
          cp -f assets/* release-guard/Documentation~/assets/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release-guard/README.md release-guard/Documentation~/assets
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync package docs from root README and assets"
            git push
          fi
